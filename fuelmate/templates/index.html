<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelMate - Smart Fuel Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f5f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .navbar-brand { font-weight: bold; color: #1f4e79 !important; }
    .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .result-card { background: #ffffff; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 30px; margin-top: 20px; }
    .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .result-table th { background: #1f4e79; color: white; padding: 12px; text-align: left; }
    .result-table td { padding: 12px; border-bottom: 1px solid #eee; }
    .cost-highlight { font-size: 1.5rem; font-weight: bold; color: #28a745; text-align: center; padding: 20px; background: #f8fff9; border-radius: 10px; border: 2px solid #28a745; }
    .btn-primary { background: linear-gradient(90deg, #667eea, #764ba2); border: none; padding: 12px 30px; border-radius: 25px; font-weight: 600; }
    .nav-btn { display: inline-block; margin: 0 6px; padding: 8px 18px; border-radius: 20px; background: linear-gradient(90deg, #667eea, #764ba2); color: #fff !important; text-decoration: none !important; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="fas fa-gas-pump me-2"></i>FuelMate</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-btn" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-btn" href="/predict">Predictor</a></li>
        </ul>
        <div class="navbar-nav">
          <span class="navbar-text me-3">Welcome, {{ session['username'] }}!</span>
          <a class="nav-btn" href="/logout">Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm p-4">
          <h4 class="text-center mb-4">🚗 Smart Fuel Consumption Predictor</h4>
          <form id="fuelForm">
            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Source</label>
                <input type="text" id="source" class="form-control" placeholder="Origin" required>
              </div>
              <div class="col">
                <label class="form-label">Destination</label>
                <input type="text" id="destination" class="form-control" placeholder="Destination" required>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Vehicle Make</label>
                <select id="vehicle_make" class="form-select" required>
                  <option value="">Select Make</option>
                </select>
              </div>
              <div class="col">
                <label class="form-label">Vehicle Model</label>
                <select id="vehicle_model" class="form-select" required disabled>
                  <option value="">Select Model</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col">
                <label class="form-label">Driving Style</label>
                <select id="driving_style" class="form-select">
                  <option value="eco">Economic</option>
                  <option value="normal" selected>Normal</option>
                  <option value="aggressive">Aggressive</option>
                </select>
              </div>
              <div class="col">
                <label class="form-label">Fuel Type</label>
                <select id="fuel_type" class="form-select">
                  <option value="petrol" selected>Petrol</option>
                  <option value="diesel">Diesel</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Temperature (°C)</label>
                <input type="number" id="temperature" class="form-control" value="25">
              </div>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-primary px-5">Get Prediction</button>
            </div>
          </form>

          <div class="result mt-4" id="result" style="display:none;">
            <div class="result-card">
              <h5 class="text-center mb-4">📊 Prediction Summary</h5>
              <table class="result-table">
                <tbody>
                  <tr><td><strong>Distance</strong></td><td id="res_distance"></td></tr>
                  <tr><td><strong>Fuel Required</strong></td><td id="res_min_fuel"></td></tr>
                  <tr><td><strong>Safe Reserve</strong></td><td id="res_safe_fuel"></td></tr>
                  <tr><td><strong>Price</strong></td><td id="res_price"></td></tr>
                </tbody>
              </table>
              <div class="cost-highlight mt-4">
                Estimated Trip Cost: <span id="res_cost"></span>
              </div>
              <div id="terrain_alert" class="alert alert-warning mt-3" style="display:none;">
                🚨 High fuel consumption expected due to terrain!
              </div>
              <div id="map" style="width:100%; height:350px; margin-top:20px; border-radius:10px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places"></script>
  <script>
    let map, ds, dr;
    let selectedEngineSize = 0, selectedCylinders = 0;

    async function init() {
      map = new google.maps.Map(document.getElementById('map'), { zoom: 7, center: { lat: 20.5937, lng: 78.9629 } });
      ds = new google.maps.DirectionsService();
      dr = new google.maps.DirectionsRenderer({ map: map });

      new google.maps.places.Autocomplete(document.getElementById('source'));
      new google.maps.places.Autocomplete(document.getElementById('destination'));

      const makeSelect = document.getElementById('vehicle_make');
      const modelSelect = document.getElementById('vehicle_model');
      
      const res = await fetch('/api/vehicles/makes');
      const makes = await res.json();
      makes.forEach(m => {
        let opt = document.createElement('option');
        opt.value = opt.text = m;
        makeSelect.add(opt);
      });

      makeSelect.onchange = async () => {
        modelSelect.innerHTML = '<option value="">Select Model</option>';
        if(!makeSelect.value) { modelSelect.disabled = true; return; }
        const r = await fetch(`/api/vehicles/models/${makeSelect.value}`);
        const models = await r.json();
        models.forEach(m => {
          let opt = document.createElement('option');
          opt.value = opt.text = m;
          modelSelect.add(opt);
        });
        modelSelect.disabled = false;
      };

      modelSelect.onchange = async () => {
        if(!modelSelect.value) return;
        const r = await fetch(`/api/vehicles/specs?make=${makeSelect.value}&model=${modelSelect.value}`);
        const specs = await r.json();
        selectedEngineSize = specs.engine_size;
        selectedCylinders = specs.cylinders;
      };
    }

    document.getElementById('fuelForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        source: document.getElementById('source').value,
        destination: document.getElementById('destination').value,
        engine_size: selectedEngineSize,
        cylinders: selectedCylinders,
        driving_style: document.getElementById('driving_style').value,
        fuel_type: document.getElementById('fuel_type').value,
        temperature: document.getElementById('temperature').value
      };

      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const r = await res.json();
      
      if(r.error) { alert(r.error); return; }

      document.getElementById('result').style.display = 'block';
      document.getElementById('res_distance').innerText = r.distance + ' km';
      document.getElementById('res_min_fuel').innerText = r.min_fuel + ' L';
      document.getElementById('res_safe_fuel').innerText = r.safe_fuel + ' L';
      document.getElementById('res_price').innerText = '₹' + r.current_fuel_price + '/L';
      document.getElementById('res_cost').innerText = '₹' + r.estimated_cost;
      
      document.getElementById('terrain_alert').style.display = r.terrain_alert ? 'block' : 'none';

      ds.route({
        origin: data.source,
        destination: data.destination,
        travelMode: 'DRIVING'
      }, (resp, status) => {
        if(status === 'OK') dr.setDirections(resp);
      });
    };

    window.onload = init;
  </script>
</body>
</html>
