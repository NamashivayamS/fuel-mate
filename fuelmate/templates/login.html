<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelMate - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      border-radius: 15px;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 400px;
      padding: 30px;
    }

    .btn-primary {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
    }
  </style>
</head>

<body>
  <div class="auth-body">
    <div class="auth-card">
      <div class="text-center mb-4">
        <i class="fas fa-gas-pump fa-3x mb-3 text-primary"></i>
        <h4>Welcome to FuelMate</h4>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <ul class="nav nav-tabs nav-justified mb-4" id="authTab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
        </li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">Sign Up</button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="login">
          <form action="/login" method="POST">
            <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email"
                class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password"
                class="form-control" required></div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>
        <div class="tab-pane fade" id="signup">
          <form action="/register" method="POST">
            <div class="mb-3"><label class="form-label">Username</label><input type="text" name="username"
                class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email"
                class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password"
                class="form-control" required></div>
            <button type="submit" class="btn btn-success w-100">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
