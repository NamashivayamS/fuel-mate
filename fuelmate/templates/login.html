<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FuelMate - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c63ff;
      --accent: #ff6584;
      --dark: #0f0f1a;
      --dark2: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --text-muted: #a0aec0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(108,99,255,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 70%, rgba(255,101,132,0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .auth-wrapper { width: 100%; max-width: 460px; padding: 20px; position: relative; z-index: 1; }
    .brand-logo {
      text-align: center; margin-bottom: 32px;
    }
    .brand-logo .icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 12px;
    }
    .brand-logo h1 {
      font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
    .auth-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
    }
    .nav-tabs { border: none; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .nav-tabs .nav-link {
      border: none; color: var(--text-muted); font-weight: 600; border-radius: 10px;
      padding: 10px 20px; transition: all 0.2s; font-size: 0.9rem;
    }
    .nav-tabs .nav-link.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff; box-shadow: 0 4px 15px rgba(108,99,255,0.3);
    }
    .nav-tabs .nav-link:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.06); }
    .form-label { color: #cbd5e0; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
    .form-control {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: #fff; border-radius: 12px; padding: 12px 16px; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.08); border-color: rgba(108,99,255,0.5);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15); color: #fff;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.25); }
    .input-group-text {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 12px 0 0 12px;
    }
    .input-group .form-control { border-radius: 0 12px 12px 0; }
    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none; border-radius: 12px; color: #fff;
      font-weight: 700; font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,99,255,0.4); }
    .btn-submit-success {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none; border-radius: 12px; color: #fff;
      font-weight: 700; font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit-success:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
    .alert {
      border-radius: 12px; border: none; font-size: 0.875rem; padding: 12px 16px;
    }
    .alert-danger { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .alert-success { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .back-home { text-align: center; margin-top: 20px; }
    .back-home a { color: var(--text-muted); font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
    .back-home a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand-logo">
      <div class="icon">⛽</div>
      <h1>FuelMate</h1>
      <p>Smart fuel prediction for every journey</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} mb-3">
            <i class="fas fa-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }} me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="auth-card">
      <ul class="nav nav-tabs nav-justified" id="authTab">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">
            <i class="fas fa-user-plus me-2"></i>Sign Up
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="login">
          <form action="/login" method="POST">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
              </div>
            </div>
            <button type="submit" class="btn-submit">
              <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
          </form>
        </div>

        <!-- SIGNUP -->
        <div class="tab-pane fade" id="signup">
          <form action="/register" method="POST">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
              </div>
            </div>
            <button type="submit" class="btn-submit-success">
              <i class="fas fa-rocket me-2"></i>Create Account
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="back-home">
      <a href="/"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
